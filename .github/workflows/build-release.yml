name: Build and Release Executables

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Version 1.0.0
      run: |
        cd v1.0.0
        pyinstaller --noconsole --onefile --name "MusicPlayer-v1.0.0" app.py
      shell: pwsh

    - name: Build Version 1.0.1
      run: |
        cd v1.0.1
        pyinstaller --noconsole --onefile --name "MusicPlayer-v1.0.1" app.py
      shell: pwsh

    - name: Upload Version 1.0.0 to Release
      uses: softprops/action-gh-release@v2
      with:
        files: v1.0.0/dist/MusicPlayer-v1.0.0.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Version 1.0.1 to Release
      uses: softprops/action-gh-release@v2
      with:
        files: v1.0.1/dist/MusicPlayer-v1.0.1.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
